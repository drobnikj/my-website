# Cloudflare Pages configuration
# This project uses Pages with Functions for both frontend and API
# - Pages serves the Vite-built React app (from dist/)
# - Functions (in functions/) handle API routes (/api/*)
# - D1 and R2 bindings work with both Pages and Functions

name = "my-website"
pages_build_output_dir = "dist"
compatibility_date = "2024-03-01"

# Production bindings - requires manual setup before deployment
# 
# ⚠️  IMPORTANT: This configuration is incomplete for production deployment.
# Before deploying, you must:
# 1. Create D1 database: wrangler d1 create my-website-db
# 2. Create R2 bucket: wrangler r2 bucket create my-website-photos
# 3. Update database_id below with the actual value from step 1
# 4. Run migrations: wrangler d1 migrations apply my-website-db --remote
# 5. Deploy: npx wrangler pages deploy dist --project-name=my-website
#
# For GitHub Actions auto-deploy, configure these bindings in the Cloudflare dashboard.

# Uncomment after creating production resources:
# [[d1_databases]]
# binding = "DB"
# database_name = "my-website-db"
# database_id = "REPLACE_WITH_ACTUAL_DATABASE_ID"

# [[r2_buckets]]
# binding = "PHOTOS"
# bucket_name = "my-website-photos"

# Local development uses local D1 and R2
# Run: npx wrangler pages dev dist --d1=DB=my-website-db --r2=PHOTOS=my-website-photos
[env.development]
[[env.development.d1_databases]]
binding = "DB"
database_name = "my-website-db"
database_id = "local"

[[env.development.r2_buckets]]
binding = "PHOTOS"
bucket_name = "my-website-photos"
