name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=my-website
      
      - name: Extract deployment URL
        id: extract-url
        run: |
          # Extract URL from wrangler output
          DEPLOY_URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Failed to extract deployment URL from wrangler output"
            exit 1
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOY_URL"
      
      - name: Post-deploy health check
        run: |
          DEPLOY_URL="${{ steps.extract-url.outputs.url }}"
          MAX_RETRIES=5
          RETRY_DELAY=2
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            if curl -f "$DEPLOY_URL/api/health"; then
              echo "✅ Health check passed"
              exit 0
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1
      
      - name: Run D1 migrations
        run: |
          echo "Running D1 migrations..."
          if npx wrangler d1 migrations apply my-website-db --remote; then
            echo "✅ Migrations completed successfully"
          else
            echo "❌ Migration failed - deployment may be in unstable state"
            echo "Please check database state and run migrations manually if needed:"
            echo "  npx wrangler d1 migrations apply my-website-db --remote"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "URL: ${{ steps.extract-url.outputs.url }}"
      
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
