name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: my-website
      D1_DATABASE_NAME: my-website-db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Extract deployment URL
        id: extract-url
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          COMMAND_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          set -euo pipefail

          DEPLOY_URL="${DEPLOYMENT_ALIAS_URL:-${DEPLOYMENT_URL:-}}"

          if [ -z "$DEPLOY_URL" ] && [ -n "${COMMAND_OUTPUT:-}" ]; then
            DEPLOY_URL=$(printf '%s\n' "$COMMAND_OUTPUT" | grep -Eo 'https://[^ ]+\.pages\.dev' | tail -n 1 || true)
          fi

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Failed to determine deployment URL from Wrangler output"
            exit 1
          fi

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOY_URL"

      - name: Post-deploy health check
        env:
          DEPLOY_URL: ${{ steps.extract-url.outputs.url }}
        run: |
          set -euo pipefail

          MAX_RETRIES=6
          RETRY_DELAY=2

          for i in $(seq 1 "$MAX_RETRIES"); do
            echo "Health check attempt $i/$MAX_RETRIES: ${DEPLOY_URL}/api/health"
            if curl --fail --show-error --silent "${DEPLOY_URL}/api/health" > /dev/null; then
              echo "✅ Health check passed"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
              sleep "$RETRY_DELAY"
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Run D1 migrations
        run: |
          set -euo pipefail
          echo "Running D1 migrations after successful deployment health check..."
          npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote
          echo "✅ Migrations completed successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "URL: ${{ steps.extract-url.outputs.url }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
